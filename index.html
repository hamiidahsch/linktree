<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>✨ Linktree • Ceria & Modern</title>

    <!-- Google Fonts: Quicksand -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- CSS Eksternal -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- ===== DEKORASI LATAR ===== -->
    <div class="deco deco-1"></div>
    <div class="deco deco-2"></div>
    <div class="deco deco-3"></div>
    <div class="deco deco-4"></div>

    <!-- ===== KARTU LINKTREE ===== -->
    <main class="linktree">

        <!-- Profil -->
        <section class="profile">
            <div class="avatar-wrap">
                <!-- Ganti src dengan foto profil kamu -->
                <img src="https://ui-avatars.com/api/?name=Mia+Cantik&size=120&background=f5576c&color=fff&bold=true&font-size=0.45" alt="Foto Profil" />
                <span class="sticker">✨ hi!</span>
            </div>
            <h1>Mia <span>Putri</span></h1>
            <p class="bio"><i class="fas fa-sparkle"></i> Content Creator &amp; Dreamer</p>
        </section>

        <!-- Divider ceria -->
        <div class="divider">
            <span class="line"></span>
            <i class="fas fa-star"></i>
            <span class="line"></span>
        </div>

        <!-- Daftar Link -->
        <div class="links">

            <!-- Instagram -->
            <a href="#" class="link-item" data-brand="instagram" target="_blank">
                <span class="icon"><i class="fab fa-instagram"></i></span>
                <span class="label">Instagram</span>
                <span class="arrow"><i class="fas fa-chevron-right"></i></span>
            </a>

            <!-- TikTok -->
            <a href="#" class="link-item" data-brand="tiktok" target="_blank">
                <span class="icon"><i class="fab fa-tiktok"></i></span>
                <span class="label">TikTok</span>
                <span class="arrow"><i class="fas fa-chevron-right"></i></span>
            </a>

            <!-- YouTube -->
            <a href="#" class="link-item" data-brand="youtube" target="_blank">
                <span class="icon"><i class="fab fa-youtube"></i></span>
                <span class="label">YouTube</span>
                <span class="arrow"><i class="fas fa-chevron-right"></i></span>
            </a>

            <!-- Twitter / X -->
            <a href="#" class="link-item" data-brand="twitter" target="_blank">
                <span class="icon"><i class="fab fa-x-twitter"></i></span>
                <span class="label">Twitter / X</span>
                <span class="arrow"><i class="fas fa-chevron-right"></i></span>
            </a>

            <!-- GitHub -->
            <a href="#" class="link-item" data-brand="github" target="_blank">
                <span class="icon"><i class="fab fa-github"></i></span>
                <span class="label">GitHub</span>
                <span class="arrow"><i class="fas fa-chevron-right"></i></span>
            </a>

            <!-- LinkedIn -->
            <a href="#" class="link-item" data-brand="linkedin" target="_blank">
                <span class="icon"><i class="fab fa-linkedin-in"></i></span>
                <span class="label">LinkedIn</span>
                <span class="arrow"><i class="fas fa-chevron-right"></i></span>
            </a>

            <!-- Spotify -->
            <a href="#" class="link-item" data-brand="spotify" target="_blank">
                <span class="icon"><i class="fab fa-spotify"></i></span>
                <span class="label">Spotify</span>
                <span class="arrow"><i class="fas fa-chevron-right"></i></span>
            </a>

        </div>

        <!-- Footer -->
        <div class="footer">
            <a href="#"><i class="fas fa-envelope"></i> Email</a>
            <a href="#"><i class="fas fa-globe"></i> Website</a>
            <a href="#"><i class="fas fa-music"></i> Playlist</a>
        </div>

    </main>

    <!-- JS Eksternal (diletakkan di akhir agar tidak menghambat render) -->
    <script src="script.js"></script>
</body>
</html>
